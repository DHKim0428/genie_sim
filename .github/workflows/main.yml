name: Build GenieSim SIF

on:
  workflow_dispatch: # 수동으로 버튼 눌러 실행

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Apptainer
        run: |
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Build SIF
        run: |
          # 아까 만든 GenieSim.def 파일이 루트에 있어야 합니다.
          sudo apptainer build genie-sim.sif GenieSim.def

      - name: Upload SIF
        uses: actions/upload-artifact@v4
        with:
          name: genie-sim-sif
          path: genie-sim.sif
          retention-days: 1 # 용량이 크니 하루만 보관
